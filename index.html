<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Cricket Pro</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --accent: #38bdf8; --red: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; text-align: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 24px; padding: 20px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        @keyframes ballGlow {
            0% { filter: drop-shadow(0 0 2px white); transform: translateY(0); }
            50% { filter: drop-shadow(0 0 8px var(--accent)); transform: translateY(-2px); }
            100% { filter: drop-shadow(0 0 2px white); transform: translateY(0); }
        }
        .glow-ball { animation: ballGlow 2s infinite ease-in-out; }

        button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-main { background: var(--blue); color: white; }
        .btn-sec { background: transparent; border: 1px solid var(--blue); color: var(--accent); }
        .btn-num { background: #2d3748; color: white; font-size: 22px; width: 30%; margin: 5px; border: 1px solid #4a5568; }
        .btn-num:active { background: var(--blue); transform: scale(0.9); }

        .score-box { background: var(--bg); padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #1e293b; }
        .score-text { font-size: 50px; font-weight: bold; color: var(--accent); margin: 0; }
        
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--blue); background: var(--bg); color: white; text-align: center; margin: 5px 0; box-sizing: border-box; }
        .color-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 12px; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }
        label { font-size: 12px; color: var(--accent); }
        .room-code { font-size: 30px; letter-spacing: 5px; color: var(--accent); background: #000; padding: 15px; border-radius: 12px; border: 1px dashed var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-menu">
        <h1 style="color: var(--accent); margin-bottom: 5px;">CRICKET PRO</h1>
        <svg viewBox="0 0 100 100" width="100" height="100" style="margin: 10px auto; display: block;">
            <defs><linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0f172a"/><stop offset="100%" style="stop-color:#3b0764"/></linearGradient></defs>
            <circle cx="50" cy="50" r="48" fill="url(#iconGrad)" stroke="white" stroke-width="2"/>
            <g fill="white">
                <rect x="32" y="35" width="7" height="35" rx="3"/><rect x="42" y="30" width="7" height="40" rx="3"/><rect x="52" y="32" width="7" height="38" rx="3"/><rect x="62" y="38" width="7" height="32" rx="3"/>
                <path d="M 32 70 Q 50 85 68 70" stroke="white" stroke-width="4" fill="none"/>
            </g>
            <circle class="glow-ball" cx="50" cy="18" r="6" fill="white"/>
        </svg>
        <button class="btn-main" onclick="openSetup('cpu', 1)">VS COMPUTER (1 WKT)</button>
        <button class="btn-main" onclick="openSetup('pvp', 1)">1 VS 1 LOCAL (1 WKT)</button>
        <button class="btn-sec" onclick="openSetup('team2', 2)">2 VS 2 TEAMS (2 WKTS)</button>
        <button class="btn-sec" onclick="openSetup('team3', 3)">3 VS 3 TEAMS (3 WKTS)</button>
        <button class="btn-main" style="background:#8b5cf6" onclick="openWireless()">WIRELESS (ROOM CODE)</button>
    </div>

    <div id="screen-setup" class="hidden">
        <h3 id="setup-title">GAME SETUP</h3>
        <p id="setup-wkt-info" style="font-size: 12px; color: var(--accent);"></p>
        <div class="color-row">
            <div style="flex:1; margin-right:10px;">
                <label id="label-p1">PLAYER 1 NAME</label>
                <input type="text" id="name-p1" placeholder="Ex: Rahul">
            </div>
            <div><label>COLOR</label><br><input type="color" id="color-p1" value="#38bdf8"></div>
        </div>
        <div class="color-row">
            <div style="flex:1; margin-right:10px;">
                <label id="label-p2">PLAYER 2 NAME</label>
                <input type="text" id="name-p2" placeholder="Ex: Arjun">
            </div>
            <div><label>COLOR</label><br><input type="color" id="color-p2" value="#ef4444"></div>
        </div>
        <button class="btn-main" onclick="confirmNames()">CONTINUE TO TOSS</button>
        <button class="btn-sec" onclick="location.reload()">BACK</button>
    </div>

    <div id="screen-toss" class="hidden">
        <h3 style="color: var(--accent);">THE TOSS</h3>
        <p id="toss-msg">Wait for Host to flip...</p>
        <div id="toss-buttons">
            <button class="btn-sec" onclick="runToss('Heads')">HEADS</button>
            <button class="btn-sec" onclick="runToss('Tails')">TAILS</button>
        </div>
    </div>

    <div id="screen-wireless" class="hidden">
        <h3>WIRELESS LOBBY</h3>
        <p style="font-size:12px; color:#94a3b8;">PICK MODE FIRST, THEN SHARE CODE</p>
        <div class="room-code" id="display-my-code">-----</div>
        <div class="color-row" style="margin-top:15px;">
            <input type="text" id="name-wire" placeholder="Your Name" style="flex:1; margin-right:10px;">
            <input type="color" id="color-wire" value="#38bdf8">
        </div>
        <input type="number" id="input-join-code" placeholder="Friend's Code">
        <button class="btn-main" onclick="joinWireless()">JOIN FRIEND</button>
        <button class="btn-sec" onclick="location.reload()">BACK</button>
    </div>

    <div id="screen-game" class="hidden">
        <div id="game-header" style="font-size:12px; color:#94a3b8;">MODE: --</div>
        <div class="score-box">
            <h2 class="score-text" id="ui-score">0</h2>
            <div id="ui-target" style="color:var(--red); font-size:14px; font-weight: bold;"></div>
        </div>
        <div style="display:flex; justify-content:space-around; margin-bottom:15px;">
            <div id="ui-p1-box" style="padding:5px 10px; border-radius:8px; background:rgba(0,0,0,0.3);">
                <span id="ui-p1-name">P1</span>: <b id="ui-p1">-</b>
            </div>
            <div id="ui-p2-box" style="padding:5px 10px; border-radius:8px; background:rgba(0,0,0,0.3);">
                <span id="ui-p2-name">P2</span>: <b id="ui-p2">-</b>
            </div>
        </div>
        <p id="ui-msg" style="color:#facc15; font-weight:bold; height: 20px;">Pick a number!</p>
        <div style="display:flex; flex-wrap:wrap; justify-content:center;">
            <button class="btn-num" onclick="pressNum(1)">1</button>
            <button class="btn-num" onclick="pressNum(2)">2</button>
            <button class="btn-num" onclick="pressNum(3)">3</button>
            <button class="btn-num" onclick="pressNum(4)">4</button>
            <button class="btn-num" onclick="pressNum(5)">5</button>
            <button class="btn-num" onclick="pressNum(6)">6</button>
        </div>
        <button onclick="location.reload()" style="background:none; color:#4a5568; margin-top:20px; font-size:12px;">EXIT</button>
    </div>
</div>

<script>
    let gMode, gPeer, gConn, isHost = false;
    let gScore = 0, gWkts = 0, gMaxWkts = 1;
    let gTarget = Infinity, gIsBatting = true;
    let gP1Move = null, gP2Move = null, gFirstInningsScore = 0;
    let name1 = "P1", name2 = "P2", color1 = "#38bdf8", color2 = "#ef4444";

    function goTo(id) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // UPDATED: Now requires wkt parameter
    function openSetup(m, wkts) {
        gMode = m; isHost = true;
        gMaxWkts = wkts;
        document.getElementById('setup-wkt-info').innerText = "Wickets for this match: " + gMaxWkts;
        document.getElementById('name-p2').value = (m === 'cpu') ? "Computer" : "";
        goTo('screen-setup');
    }

    function confirmNames() {
        name1 = document.getElementById('name-p1').value || "P1";
        name2 = document.getElementById('name-p2').value || "P2";
        color1 = document.getElementById('color-p1').value;
        color2 = document.getElementById('color-p2').value;
        document.getElementById('toss-msg').innerText = `${name1}, flip the coin!`;
        goTo('screen-toss');
    }

    function runToss(choice) {
        let win = Math.random() > 0.5;
        if (gMode === 'wireless') {
            gConn.send({type: 'toss', hostBatting: win, wkts: gMaxWkts});
            applyToss(win);
        } else {
            applyToss(win);
        }
    }

    function applyToss(hostIsBatting) {
        gIsBatting = hostIsBatting;
        let winner = hostIsBatting ? name1 : name2;
        alert(`${winner} wins the toss and will BAT first!`);
        startGame();
    }

    function startGame() {
        document.getElementById('ui-p1-name').innerText = name1;
        document.getElementById('ui-p1-box').style.border = `2px solid ${color1}`;
        document.getElementById('ui-p2-name').innerText = name2;
        document.getElementById('ui-p2-box').style.border = `2px solid ${color2}`;
        goTo('screen-game');
        refreshUI();
    }

    function openWireless() {
        goTo('screen-wireless');
        isHost = true;
        const code = Math.floor(10000 + Math.random() * 90000).toString();
        gPeer = new Peer('hc-' + code);
        gPeer.on('open', id => { document.getElementById('display-my-code').innerText = code; });
        gPeer.on('connection', c => { 
            gConn = c; 
            name1 = document.getElementById('name-wire').value || "Host";
            color1 = document.getElementById('color-wire').value;
            // Send setup including current max wickets
            gConn.send({type: 'setup', name: name1, color: color1, wkts: gMaxWkts});
            gMode = 'wireless';
            setupWireEvents();
        });
    }

    function joinWireless() {
        const code = document.getElementById('input-join-code').value;
        isHost = false; gMode = 'wireless';
        name2 = document.getElementById('name-wire').value || "Joiner";
        color2 = document.getElementById('color-wire').value;
        gPeer = new Peer();
        gPeer.on('open', () => {
            gConn = gPeer.connect('hc-' + code);
            gConn.on('open', () => {
                gConn.send({type: 'setup', name: name2, color: color2});
                setupWireEvents();
            });
        });
    }

    function setupWireEvents() {
        gConn.on('data', data => { 
            if(data.type === 'setup') {
                if(isHost) { 
                    name2 = data.name; color2 = data.color; 
                    goTo('screen-toss'); 
                } 
                else { 
                    name1 = data.name; color1 = data.color; 
                    gMaxWkts = data.wkts || 1; // Joiner learns how many wickets from host
                    document.getElementById('toss-buttons').classList.add('hidden'); 
                    goTo('screen-toss'); 
                }
            } else if(data.type === 'toss') {
                gMaxWkts = data.wkts || gMaxWkts;
                applyToss(!data.hostBatting);
            } else {
                gP2Move = data; checkWireless(); 
            }
        });
    }

    function checkWireless() {
        if(gP1Move !== null && gP2Move !== null) { compare(gP1Move, gP2Move); gP1Move = null; gP2Move = null; }
    }

    function pressNum(n) {
        if(gMode === 'cpu') compare(n, Math.floor(Math.random()*6)+1);
        else if(gMode === 'wireless') {
            gP1Move = n; gConn.send(n);
            document.getElementById('ui-msg').innerText = "Waiting for " + name2 + "...";
            checkWireless();
        } else {
            if(gP1Move === null) { gP1Move = n; document.getElementById('ui-msg').innerText = "Move Hidden!"; }
            else { compare(gP1Move, n); gP1Move = null; }
        }
    }

    function compare(m1, m2) {
        document.getElementById('ui-p1').innerText = m1;
        document.getElementById('ui-p2').innerText = m2;
        if(m1 === m2) {
            gWkts++;
            if(gWkts >= gMaxWkts) handleInnings();
            else document.getElementById('ui-msg').innerText = "OUT! Wkts: " + gWkts + "/" + gMaxWkts;
        } else {
            gScore += gIsBatting ? m1 : m2;
            document.getElementById('ui-score').innerText = gScore;
            if(!gIsBatting && gScore >= gTarget) finish(name2);
        }
        refreshUI();
    }

    function handleInnings() {
        if(gTarget === Infinity) {
            gFirstInningsScore = gScore; gTarget = gScore + 1;
            gScore = 0; gWkts = 0; gIsBatting = !gIsBatting;
            document.getElementById('ui-target').innerText = "TARGET: " + gTarget;
            document.getElementById('ui-score').innerText = "0";
            alert(`Innings Over! Target set: ${gTarget}`);
        } else { finish(gFirstInningsScore > gScore ? name1 : name2); }
    }

    function refreshUI() {
        let bNow = gIsBatting ? name1 : name2;
        document.getElementById('game-header').innerText = `${gMode.toUpperCase()} | ${bNow} BATTING | WKTS: ${gWkts}/${gMaxWkts}`;
    }

    function finish(w) { alert("🏆 WINNER: " + w); location.reload(); }
</script>
</body>
</html>
